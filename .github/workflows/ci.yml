name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://dental:dental123@localhost:5432/dental_clinic_test
  SESSION_SECRET: test-session-secret-at-least-32-characters-long-for-ci
  NODE_ENV: test

jobs:
  # ==========================================
  # Lint & Type Check
  # ==========================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: TypeScript Check
        run: npm run check

      - name: ESLint
        run: npx eslint . --max-warnings 0

  # ==========================================
  # Unit & Integration Tests
  # ==========================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dental_clinic_test
          POSTGRES_USER: dental
          POSTGRES_PASSWORD: dental123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Run Unit Tests
        run: npx vitest run --reporter=verbose
        env:
          REDIS_URL: redis://localhost:6379

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  # ==========================================
  # Build
  # ==========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/

  # ==========================================
  # Security Audit
  # ==========================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: NPM Audit (Critical/High)
        run: npm audit --omit=dev --audit-level=critical

      - name: NPM Audit (All - Advisory)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          # Check for common secret patterns (API keys, AWS keys, private keys)
          FOUND=0
          if grep -rn "sk_live_\|sk_test_\|AKIA[0-9A-Z]\|-----BEGIN.*PRIVATE KEY" --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir=node_modules .; then
            FOUND=1
          fi
          # Check for hardcoded tokens/passwords
          if grep -rn "password.*=.*['\"].\{8,\}['\"]" --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir=node_modules --exclude="*.test.*" --exclude="*.spec.*" . | grep -v "example\|placeholder\|fake\|test\|mock"; then
            FOUND=1
          fi
          if [ "$FOUND" = "1" ]; then
            echo "::warning::Potential secrets found in source code!"
          fi
